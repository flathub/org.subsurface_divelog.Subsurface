app-id: org.subsurface_divelog.Subsurface
sdk: org.kde.Sdk
runtime: org.kde.Platform
runtime-version: 5.15-25.08
base: io.qt.qtwebkit.BaseApp
base-version: 5.15-25.08
command: subsurface
rename-icon: subsurface-icon
rename-appdata-file: subsurface.metainfo.xml
rename-desktop-file: subsurface.desktop
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --share=network
  - --allow=bluetooth
  - --device=all # required to talk to dive computers
  - --system-talk-name=org.bluez # required to talk to dive computers
  - --filesystem=xdg-config/kdeglobals:ro # gives application access to kdeglobals
  - --filesystem=~/.subsurface # read and write configuration and default logbook location
  - --talk-name=com.canonical.AppMenu.Registrar # required for global menu
cleanup-commands:
  - /app/cleanup-BaseApp.sh
cleanup:
  - /include
  - /lib/pkgconfig
  - /share/doc
  - /share/man
  - /src
  - '*.a'
  - '*.la'
modules:
  - name: libssh2
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DCMAKE_C_FLAGS=-fPIC
    sources:
      - type: archive
        url: https://github.com/libssh2/libssh2/archive/libssh2-1.11.1.tar.gz
        sha256: 82b35c61c78b475647bdc981a183c5b5ab0d979e1caee94186e8f9150f2b0d0d
        x-checker-data:
          type: anitya
          project-id: 1730
          url-template: https://github.com/libssh2/libssh2/archive/libssh2-$version.tar.gz

  - name: libzip
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
    sources:
      - type: archive
        url: https://github.com/nih-at/libzip/archive/v1.11.4.tar.gz
        sha256: 4844595615e2436e3cf1ed46a1b260fbdaf8b8fa8f2b594e8b5d8162c696b8b2
        x-checker-data:
          type: anitya
          project-id: 10649
          url-template: https://github.com/nih-at/libzip/archive/v$version.tar.gz

  - name: grantlee
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
    sources:
      - type: archive
        url: https://github.com/steveire/grantlee/archive/v5.3.1.tar.gz
        sha256: ba288ae9ed37ec0c3622ceb40ae1f7e1e6b2ea89216ad8587f0863d64be24f06
        x-checker-data:
          type: anitya
          project-id: 21448
          url-template: https://github.com/steveire/grantlee/archive/v$version.tar.gz

  - name: libgit2
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
    sources:
      - type: archive
        url: https://github.com/libgit2/libgit2/archive/v1.9.2.tar.gz
        sha256: 6f097c82fc06ece4f40539fb17e9d41baf1a5a2fc26b1b8562d21b89bc355fe6
        x-checker-data:
          type: anitya
          project-id: 1627
          url-template: https://github.com/libgit2/libgit2/archive/v$version.tar.gz

  # flatpak-pip-generator docutils
  - python3-docutils.json

  - name: bluez
    config-opts:
      - --disable-datafiles
      - --disable-systemd
      - --enable-experimental
      - --enable-library
      - --disable-client
      - --disable-mesh
      - --disable-tools
      - --disable-monitor
      - --disable-udev
      - --prefix=/app
      - --sysconfdir=/app/etc
    sources:
      - type: archive
        url: http://www.kernel.org/pub/linux/bluetooth/bluez-5.72.tar.xz
        sha256: 499d7fa345a996c1bb650f5c6749e1d929111fa6ece0be0e98687fee6124536e
        # temporarily disabled, since newer versions can't be buiilt without CUPS support
        #x-checker-data:
        #  type: anitya
        #  project-id: 10029
        #  url-template: http://www.kernel.org/pub/linux/bluetooth/bluez-$version.tar.xz

  - name: qtconnectivity
    buildsystem: simple
    cleanup-platform:
      - /bin
      - /mkspecs
    sources:
    # When using the archive instead of git, the build fails with the following error
    # In file included from qlowenergycontroller.cpp:52:
    # bluez/bluez5_helper_p.h:57:10: fatal error: QtBluetooth/private/qtbluetoothglobal_p.h: No such file or directory
    #    57 | #include <QtBluetooth/private/qtbluetoothglobal_p.h>
    #       |          ^~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
      - type: git
        url: https://github.com/qt/qtconnectivity
        tag: v5.15.18-lts-lgpl
        commit: 5b2159be824888876953e263204039e89f59c4c1
        x-checker-data:
          type: anitya
          project-id: 153467
          tag-template: v$version
          stable-only: true

    build-commands:
      - qmake
      - make -j $FLATPAK_BUILDER_N_JOBS
      - cp -r -n {bin,include,lib} /app
      - mkdir -p /app/src/bluetooth
      - cp -r src/bluetooth /app/src/ # header files required by subsurface

  - name: googlemaps
    buildsystem: qmake
    sources:
      - type: git
        url: https://github.com/subsurface/googlemaps
        commit: 7ce7124b385b2ebac0f72c38b094f436d4fe5c58
      - type: shell
        commands:
          - sed -i "s|\$\$\[QT_INSTALL_PLUGINS\]|/app/lib/plugins|" googlemaps.pro

  - name: libconfuse # build dependency of libftdi
    sources:
      - type: archive
        url: https://github.com/libconfuse/libconfuse/archive/v3.3.tar.gz
        sha256: cb90c06f2dbec971792af576d5b9a382fb3c4ca2b1deea55ea262b403f4e641e
        x-checker-data:
          type: anitya
          project-id: 1581
          url-template: https://github.com/libconfuse/libconfuse/archive/v$version.tar.gz

  - name: libftdi
    buildsystem: cmake-ninja
    config-opts:
      - -DLIB_SUFFIX=
      - -Wno-dev # suppress warning for project developers
      - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
    sources:
      - type: archive
        url: https://www.intra2net.com/en/developer/libftdi/download/libftdi1-1.5.tar.bz2
        sha256: 7c7091e9c86196148bd41177b4590dccb1510bfe6cea5bf7407ff194482eb049
        x-checker-data:
          type: anitya
          project-id: 14622
          url-template: https://www.intra2net.com/en/developer/libftdi/download/libftdi1-$version.tar.bz2

  - name: subsurface
    buildsystem: cmake
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DFTDISUPPORT=ON
      - -DNO_USERMANUAL=ON
      - -DQt5WebKitWidgets_DIR=/app/lib/cmake/Qt5WebKitWidgets
      - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
      - -DBUILD_TESTS=ON
    sources:
      # Subsurface has switched to a rolling release
      # https://subsurface.github.io/en/release/2023/12/release-changes/
      - type: git # use git in order to make HandleVersionGeneration.cmake work
        url: https://github.com/subsurface/subsurface
        commit: 33edd0237b2724857a9ab20f59560a59e8cc8db1
      # get-version.sh requires the nightly-builds repo to look up the build number for the current commit;
      # provide it as a source so it is fetched before network access is disabled for the build
      - type: git
        url: https://github.com/subsurface/nightly-builds
        commit: 48fb3ce6f1893ce5aa7d33eb79d270f368f7db2d
        dest: nightly-builds
      - type: shell
        commands:
          - cd libdivecomputer && autoreconf --install && ./configure --prefix=/app
            && make && mkdir -p /app/include && make install
      - type: shell
        commands:
          - sed -e "s|setDesktopFileName(\"subsurface\")|setDesktopFileName(\"org.subsurface_divelog.Subsurface\")|"
            -i core/qt-init.cpp
          # Place the build number file where get-version.sh expects it (checked before any network access)
          - cp nightly-builds/latest-subsurface-buildnumber .
          - scripts/get-version.sh 4 > .gitversion
          - git log -1 --format="%at" | xargs -I{} date -d @{} +%Y-%m-%d > .gitdate
          - rm -rf nightly-builds
    # Tests are mandatory for this package update. Exclude the one network-dependent test because Flatpak builds run with network isolation.
    build-commands:
      - cd /run/build/subsurface/_flatpak_build && QT_QPA_PLATFORM=offscreen ctest --output-on-failure -E '^TestParsePerformance$'
